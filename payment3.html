<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rent Mate | Arena Checkout</title>
  <style>
    :root {
      --bg-base: #090909;
      --bg-surface: rgba(18, 18, 18, 0.75);
      --bg-surface-solid: #121212;
      --primary-orange: #FF8C42;
      --secondary-gold: #FFD166;
      --accent-teal: #00D4B3;
      --text-main: #FFFFFF;
      --text-muted: #A0A0A0;
      --border-glass: rgba(255, 140, 66, 0.2);
      --glass-blur: blur(20px);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      --sidebar-width: 280px;
    }

    [data-theme="light"] {
      --bg-base: #F8FAFC;
      --bg-surface: rgba(255, 255, 255, 0.85);
      --bg-surface-solid: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #475569;
      --border-glass: rgba(255, 140, 66, 0.3);
      --glass-shadow: 0 8px 32px 0 rgba(148, 163, 184, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
    body { background: radial-gradient(circle at top right, rgba(255,140,66,0.05), transparent 40%), radial-gradient(circle at bottom left, rgba(0,212,179,0.05), transparent 40%); background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; width: 100%; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; top: 0; left: 0; background: var(--bg-surface-solid); border-right: 1px solid var(--border-glass); display: flex; flex-direction: column; z-index: 100; }
    .brand-logo { padding: 24px; border-bottom: 1px solid var(--border-glass); display: flex; align-items: center; gap: 12px; }
    .brand-logo img { height: 40px; border-radius: 8px; }
    .nav-menu { padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; list-style: none; overflow-y: auto; }
    .nav-item a { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 12px; }
    .nav-item a:hover { background: rgba(255, 140, 66, 0.1); color: var(--primary-orange); }
    .nav-item.active a { background: linear-gradient(135deg, rgba(255,209,102,0.1), rgba(255,140,66,0.1)); color: var(--secondary-gold); border-left: 3px solid var(--secondary-gold); }
    .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--border-glass); }
    .btn-back { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(255, 90, 90, 0.1); color: #FF5A5A; text-decoration: none; font-size: 14px; font-weight: 700; border-radius: 12px; border: 1px solid rgba(255, 90, 90, 0.2); }
    
    /* MAIN CONTENT */
    .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; }
    .top-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
    .welcome-text h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .welcome-text p { color: var(--text-muted); font-size: 14px; display: flex; align-items: center; gap: 6px; }
    
    .theme-toggle-btn { background: var(--bg-surface-solid); border: 1px solid var(--border-glass); padding: 10px 18px; border-radius: 30px; color: var(--text-main); cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; box-shadow: var(--glass-shadow); }
    
    /* CHECKOUT LAYOUT - CENTERED SINGLE COLUMN */
    .checkout-wrapper { max-width: 800px; margin: 0 auto; }
    .checkout-panel { background: var(--bg-surface); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-glass); border-radius: 20px; padding: 40px; box-shadow: var(--glass-shadow); }
    
    .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--secondary-gold); border-bottom: 1px solid var(--border-glass); padding-bottom: 12px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .form-input { width: 100%; padding: 14px 16px; background: rgba(128, 128, 128, 0.1); border: 1px solid var(--border-glass); border-radius: 12px; color: var(--text-main); font-size: 14px; outline: none; }
    .form-input:focus { border-color: var(--secondary-gold); background: rgba(255, 209, 102, 0.05); }
    .form-input option { background: var(--bg-surface-solid); color: var(--text-main); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    .btn-pay { width: 100%; padding: 18px; margin-top: 32px; background: linear-gradient(135deg, var(--secondary-gold), #F5B041); color: #090909; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 20px rgba(255, 209, 102, 0.3); transition: all 0.3s ease; }
    .btn-pay:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 209, 102, 0.5); }

    /* MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-box { background: var(--bg-surface-solid); border: 1px solid var(--accent-teal); border-radius: 24px; padding: 40px; text-align: center; max-width: 400px; transform: scale(0.9); transition: transform 0.3s; }
    .modal-overlay.active .modal-box { transform: scale(1); }
    .modal-icon { font-size: 60px; margin-bottom: 16px; }

    /* RESPONSIVE */
    @media (max-width: 1024px) { .sidebar { width: 80px; } .brand-logo h2, .nav-item .nav-text, .btn-back .nav-text { display: none; } .main-content { margin-left: 80px; width: calc(100% - 80px); } }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .sidebar { width: 60px; } .main-content { margin-left: 60px; width: calc(100% - 60px); padding: 20px; } .checkout-panel { padding: 24px; } }
  </style>
</head>
<body>
  
  <aside class="sidebar">
    <div class="brand-logo">
      <img src="FullLogo.jpg" alt="Logo">
      <h2>Rent Mate</h2>
    </div>
    <ul class="nav-menu">
      <li class="nav-item"><a href="home.html"><span class="nav-icon">🏠</span><span class="nav-text">Home Dashboard</span></a></li>
      <li class="nav-item active"><a href="sports_arena.html"><span class="nav-icon">🎾</span><span class="nav-text">Sports Arena</span></a></li>
    </ul>
    <div class="sidebar-bottom">
      <a href="sports_arena.html" class="btn-back">⬅️ <span class="nav-text">Back to Arenas</span></a>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="welcome-text">
        <h1>Arena Checkout</h1>
        <p>🔒 Secure your slot instantly.</p>
      </div>
      <button class="theme-toggle-btn" id="theme-toggle">☀️ Light Mode</button>
    </header>

    <div class="checkout-wrapper">
      <div class="checkout-panel">
        
        <!-- 1. Booking Details -->
        <h2 class="panel-title">1. Booking Details</h2>
        <div class="form-row">
          <div class="form-group"><label>Player / Team Name</label><input type="text" class="form-input" placeholder="Enter Name"></div>
          <div class="form-group"><label>Contact Number</label><input type="tel" class="form-input" placeholder="+91 98765 43210"></div>
        </div>
        
        <div class="form-row">
          <div class="form-group"><label>Date of Booking</label><input type="date" class="form-input"></div>
          <div class="form-group">
            <label>Select Time Slot</label>
            <select class="form-input">
              <option value="morning1">06:00 AM - 08:00 AM</option>
              <option value="morning2">08:00 AM - 10:00 AM</option>
              <option value="evening1">05:00 PM - 07:00 PM</option>
              <option value="evening2">07:00 PM - 09:00 PM</option>
              <option value="night">09:00 PM - 11:00 PM</option>
            </select>
          </div>
        </div>

        <!-- 2. Payment Method -->
        <h2 class="panel-title" style="margin-top: 40px;">2. Payment Method</h2>
        <div class="form-group">
          <label>Select Payment Mode</label>
          <select class="form-input" id="paymentMode" onchange="togglePaymentDetails()">
            <option value="upi">UPI</option>
            <option value="card">Credit / Debit Card</option>
            <option value="venue">Pay at Venue</option>
          </select>
        </div>
        
        <div class="form-group" id="paymentDetailsInput">
          <label>UPI ID or Card Number</label>
          <input type="text" class="form-input" placeholder="user@upi or XXXX-XXXX-XXXX">
        </div>

        <button class="btn-pay" onclick="processPayment()">Confirm Slot</button>
      </div>
    </div>
  </main>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successModal">
    <div class="modal-box">
      <div class="modal-icon">🏆</div>
      <h2 style="margin-bottom: 12px;">Slot Booked!</h2>
      <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">Your sports arena slot has been successfully reserved. Please arrive 15 minutes before your scheduled time.</p>
      <a href="home.html" class="btn-pay" style="display: block; text-decoration: none;">Return to Dashboard</a>
    </div>
  </div>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      document.documentElement.setAttribute('data-theme', isLight ? '' : 'light');
      document.getElementById('theme-toggle').innerHTML = isLight ? '☀️ Light Mode' : '🌙 Dark Mode';
    });

    function togglePaymentDetails() {
      const mode = document.getElementById('paymentMode').value;
      const detailsInput = document.getElementById('paymentDetailsInput');
      if (mode === 'venue') {
        detailsInput.style.display = 'none';
      } else {
        detailsInput.style.display = 'block';
      }
    }

    function processPayment() {
      // Simulate payment processing
      const btn = document.querySelector('.btn-pay');
      btn.innerText = "Processing...";
      btn.style.opacity = "0.7";
      setTimeout(() => {
        document.getElementById('successModal').classList.add('active');
      }, 1500);
    }
  </script>
</body>
</html>
